<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="RTPSC treasury seal emblem">
  <defs>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7cf87" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#9c7a1e" />
    </linearGradient>
    <radialGradient id="navyField" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#22345f" />
      <stop offset="100%" stop-color="#0e1730" />
    </radialGradient>
    <path id="ringText" d="M100,100 m-74,0 a74,74 0 1,1 148,0 a74,74 0 1,1 -148,0" fill="none" />
  </defs>

  <!-- Outer field + milled coin edge -->
  <circle cx="100" cy="100" r="96" fill="url(#navyField)" stroke="url(#goldStroke)" stroke-width="3" />
  <circle cx="100" cy="100" r="90" fill="none" stroke="#d4af37" stroke-width="4"
    stroke-dasharray="1.4 3.2" opacity="0.85" />
  <circle cx="100" cy="100" r="74" fill="none" stroke="url(#goldStroke)" stroke-width="1.4" opacity="0.9" />

  <!-- Curved seal text -->
  <text font-family="Palatino, Georgia, serif" font-size="11" letter-spacing="3.4"
    fill="#e7cf87" font-weight="600">
    <textPath href="#ringText" startOffset="2%">RTPSC · TAX PLATFORM · SOVEREIGN LEDGER · </textPath>
  </text>

  <!-- Crest shield with ascending ledger bars -->
  <path d="M100 58 L134 70 L134 110 Q134 140 100 154 Q66 140 66 110 L66 70 Z"
    fill="#14213d" stroke="url(#goldStroke)" stroke-width="2.4" />
  <g fill="url(#goldStroke)">
    <rect x="80" y="118" width="10" height="18" rx="2" />
    <rect x="95" y="106" width="10" height="30" rx="2" />
    <rect x="110" y="94" width="10" height="42" rx="2" />
  </g>
  <!-- Ascent arrow over the bars -->
  <path d="M78 104 L100 84 L122 104" fill="none" stroke="#e7cf87" stroke-width="2.6"
    stroke-linecap="round" stroke-linejoin="round" />

  <!-- Crown star -->
  <path d="M100 30 l3.2 6.6 7.3 1 -5.3 5.1 1.3 7.2 -6.5 -3.4 -6.5 3.4 1.3 -7.2 -5.3 -5.1 7.3 -1 Z"
    fill="#d4af37" />
</svg>
