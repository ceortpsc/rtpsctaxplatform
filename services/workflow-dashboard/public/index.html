<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RTPSC Workflow Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%99%EF%B8%8F%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">RTPSC</span>
        <span class="brand-title">Workflow Operations Dashboard</span>
      </div>
      <div class="stats" id="stats">
        <div class="stat"><span class="stat-value" id="stat-total">0</span><span class="stat-label">Runs</span></div>
        <div class="stat ok"><span class="stat-value" id="stat-succeeded">0</span><span class="stat-label">Succeeded</span></div>
        <div class="stat fail"><span class="stat-value" id="stat-failed">0</span><span class="stat-label">Failed</span></div>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>Modular Workflows</h2>
          <span class="hint">Trigger a workflow and watch it execute step by step.</span>
        </div>
        <div id="workflows" class="workflow-grid">
          <p class="empty">Loading workflows…</p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Run History</h2>
          <button id="refresh" class="ghost-btn" type="button">Refresh</button>
        </div>
        <div id="runs" class="runs">
          <p class="empty">No runs yet. Trigger a workflow to get started.</p>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <template id="workflow-card-template">
      <article class="card">
        <div class="card-head">
          <h3 class="card-title"></h3>
          <span class="badge trigger"></span>
        </div>
        <p class="card-desc"></p>
        <div class="tags"></div>
        <ol class="steps"></ol>
        <div class="card-actions">
          <textarea class="input-json" spellcheck="false" rows="3"></textarea>
          <button class="run-btn" type="button">Run workflow</button>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
