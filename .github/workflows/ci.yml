name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: AOL install
        run: node ./tools/aol/bin/aol.mjs install
      - run: node ./tools/aol/bin/aol.mjs run lint
      - run: node ./tools/aol/bin/aol.mjs run test
      - run: node ./tools/aol/bin/aol.mjs run build
